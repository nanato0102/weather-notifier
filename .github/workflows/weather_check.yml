name: Daily Weather & Outfit Notifier

on:
  schedule:
    - cron: '38 21 * * *' # 日本時間 7:30
  workflow_dispatch:

jobs:
  check-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Get weather and notify
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # 東京の天気・気温データを取得
          RESPONSE=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&daily=precipitation_probability_max,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo")
          
          # 各データの抽出（小数点以下を切り捨てて整数に変換）
          PROB_MAX=$(echo $RESPONSE | jq '.daily.precipitation_probability_max[0]')
          TEMP_MAX=$(echo $RESPONSE | jq '.daily.temperature_2m_max[0] | floor')
          TEMP_MIN=$(echo $RESPONSE | jq '.daily.temperature_2m_min[0] | floor')
          
          # 傘の判定
          if [ $PROB_MAX -ge 50 ]; then
            UMBRELLA="☔ 降水確率 ${PROB_MAX}% です。傘を忘れずに！"
          else
            UMBRELLA="☀️ 降水確率 ${PROB_MAX}% です。傘はなくて大丈夫そうです。"
          fi
          
          # 服装の判定（最高気温ベース）
          if [ $TEMP_MAX -ge 25 ]; then
            OUTFIT="👕 半袖や軽いシャツが快適です。"
          elif [ $TEMP_MAX -ge 20 ]; then
            OUTFIT="👔 シャツにジャケット、または薄手の長袖がおすすめ。"
          elif [ $TEMP_MAX -ge 15 ]; then
            OUTFIT="🧥 カーディガンやトレンチコートなど、羽織るものが必要です。"
          elif [ $TEMP_MAX -ge 10 ]; then
            OUTFIT="🧥 冬用コートや厚手のニットで暖かくしてください。"
          else
            OUTFIT="🧣 しっかりとした防寒対策（マフラーや厚手コート）を！"
          fi
          
          # メッセージ組み立て（「本日の予報」を削除）
          MESSAGE="🌡️ 気温: 最低 ${TEMP_MIN}℃ / 最高 ${TEMP_MAX}℃\n${UMBRELLA}\n${OUTFIT}"
          
          # Discordへ送信
          curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"$MESSAGE\"}" $WEBHOOK_URL
